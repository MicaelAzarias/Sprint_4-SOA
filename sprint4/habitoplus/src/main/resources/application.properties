spring.application.name=HabitoPlus

# Banco de dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/habitoplus?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=@F1lh0t2s
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT — substitua o secret por uma string longa e segura em produção
jwt.secret=habitoplus-super-secret-key-2025-soa-sprint4-fiap
jwt.expiration-ms=86400000

# Servidor
server.port=8080

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
